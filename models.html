href="css/footer.css">

src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body>

<header>

<nav>

<div class="logo">

SUPER<span>CARS</span>

</div>

<ul>

    <li><a href="index.html">Home</a></li>
    <li><a href="explore.html">Explore</a></li>
    <li><a href="models.html">Models</a></li>
    <li><a href="contact.html">Contact</a></li>

</ul>

</nav>

</header>

<section class="models">

<section class="car-viewer">

    <div class="section-title">

        <h2>3D Car Showcase</h2>

        <p>Rotate • Zoom • Explore</p>

    </div>

    <div class="viewer-grid">

        <!-- Porsche -->

        <div class="viewer-card">

            <h3>Porsche 911</h3>

            <model-viewer

                src="assets/models/porsche911.glb"

                camera-controls

                auto-rotate

                shadow-intensity="1"

                exposure="1.1"

                environment-image="neutral"

                loading="eager"

                touch-action="pan-y">

            </model-viewer>

        </div>

        <!-- Nissan -->

        <div class="viewer-card">

            <h3>Nissan GT-R R35</h3>

            <model-viewer

                src="assets/models/gtrr35.glb"

                camera-controls

                auto-rotate

                shadow-intensity="1"

                exposure="1.1"

                environment-image="neutral"

                loading="eager"

                touch-action="pan-y">

            </model-viewer>

        </div>

    </div>

</section>


</section>

</body>

</html>
